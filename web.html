<!DOCTYPE html>
<html lang="vi">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MedPulse IoT Dashboard</title>
	<script>
		tailwind = {
			config: {
				darkMode: 'class',
				theme: {
					extend: {
						fontFamily: {
							sans: ['"Plus Jakarta Sans"', 'ui-sans-serif', 'system-ui'],
						},
						boxShadow: {
							soft: '0 18px 50px rgba(15, 23, 42, 0.08)',
							glow: '0 0 0 1px rgba(59, 130, 246, 0.12), 0 20px 40px rgba(56, 189, 248, 0.12)',
						},
						colors: {
							brand: {
								50: '#eff8ff',
								100: '#dff2ff',
								200: '#b9e6ff',
								300: '#7ed3ff',
								400: '#4bb9ff',
								500: '#2196ff',
								600: '#157be6',
								700: '#115fb8',
							},
							mint: {
								50: '#effcf4',
								100: '#d9f8e5',
								200: '#b7efd0',
								300: '#86e0b1',
								400: '#4fca8a',
								500: '#20b46d',
							},
						},
						keyframes: {
							floaty: {
								'0%, 100%': { transform: 'translateY(0px)' },
								'50%': { transform: 'translateY(-6px)' },
							},
							pulseDanger: {
								'0%, 100%': { transform: 'scale(1)', boxShadow: '0 0 0 0 rgba(239, 68, 68, 0.45)' },
								'50%': { transform: 'scale(1.02)', boxShadow: '0 0 0 18px rgba(239, 68, 68, 0)' },
							},
							shimmer: {
								'0%': { backgroundPosition: '-150% 0' },
								'100%': { backgroundPosition: '150% 0' },
							},
							slideIn: {
								'0%': { opacity: '0', transform: 'translateY(14px)' },
								'100%': { opacity: '1', transform: 'translateY(0)' },
							},
							pop: {
								'0%': { opacity: '0', transform: 'scale(0.94)' },
								'100%': { opacity: '1', transform: 'scale(1)' },
							},
						},
						animation: {
							floaty: 'floaty 7s ease-in-out infinite',
							pulseDanger: 'pulseDanger 1.2s ease-in-out infinite',
							shimmer: 'shimmer 1.3s linear infinite',
							slideIn: 'slideIn 0.45s ease-out both',
							pop: 'pop 0.24s ease-out both',
						},
					},
				},
			},
		};
	</script>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
	<style>
		:root {
			--bg: 249 250 255;
			--panel: 255 255 255;
			--panel-2: 244 248 252;
			--text: 15 23 42;
			--muted: 96 110 132;
			--border: 226 232 240;
			--shadow: 15 23 42;
		}
		.dark {
			--bg: 8 15 30;
			--panel: 13 21 36;
			--panel-2: 17 28 47;
			--text: 238 243 255;
			--muted: 148 163 184;
			--border: 35 47 72;
			--shadow: 0 0 0;
		}
		html, body {
			height: 100%;
		}
		body {
			margin: 0;
			font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui;
			background:
				radial-gradient(circle at top left, rgba(59, 130, 246, 0.14), transparent 28%),
				radial-gradient(circle at top right, rgba(32, 180, 109, 0.12), transparent 24%),
				linear-gradient(180deg, rgb(var(--bg)) 0%, rgb(var(--bg)) 100%);
			color: rgb(var(--text));
			transition: background 0.35s ease, color 0.35s ease;
		}
		.glass {
			background: rgba(var(--panel), 0.78);
			backdrop-filter: blur(18px);
			-webkit-backdrop-filter: blur(18px);
			border: 1px solid rgba(var(--border), 0.55);
		}
		.card {
			background: rgb(var(--panel));
			border: 1px solid rgba(var(--border), 0.7);
			box-shadow: 0 18px 40px rgba(15, 23, 42, 0.06);
		}
		.soft-grid {
			background-image:
				linear-gradient(to right, rgba(148,163,184,0.12) 1px, transparent 1px),
				linear-gradient(to bottom, rgba(148,163,184,0.12) 1px, transparent 1px);
			background-size: 20px 20px;
		}
		.noise {
			position: absolute;
			inset: 0;
			opacity: 0.16;
			mix-blend-mode: soft-light;
			pointer-events: none;
			background-image: radial-gradient(rgba(255,255,255,0.95) 0.6px, transparent 0.6px);
			background-size: 12px 12px;
		}
		.table-scroll::-webkit-scrollbar,
		.hide-scrollbar::-webkit-scrollbar {
			height: 10px;
			width: 10px;
		}
		.table-scroll::-webkit-scrollbar-thumb,
		.hide-scrollbar::-webkit-scrollbar-thumb {
			background: rgba(148, 163, 184, 0.35);
			border-radius: 999px;
		}
		.sticky-blur {
			background: rgba(var(--bg), 0.72);
			backdrop-filter: blur(14px);
		}
		.pulse-critical {
			animation: pulseDanger 1.2s ease-in-out infinite;
		}
		.skeleton {
			background: linear-gradient(90deg, rgba(148,163,184,0.12) 25%, rgba(148,163,184,0.22) 37%, rgba(148,163,184,0.12) 63%);
			background-size: 400% 100%;
		}
	</style>
</head>
<body class="text-slate-900 dark:text-slate-100">
	<div id="app"></div>

	<script src="https://unpkg.com/lucide@latest"></script>
	<script>
		const STORAGE_KEY = 'medpulse-dashboard-v1';
		const THEME_KEY = 'medpulse-theme';
		const DEMO_PASSWORD = 'demo123';

		const state = {
			authed: false,
			screen: 'landing',
			view: 'dashboard',
			sidebarOpen: true,
			darkMode: window.matchMedia('(prefers-color-scheme: dark)').matches,
			notificationsOpen: false,
			profileOpen: false,
			settingsOpen: false,
			alertModal: null,
			toastQueue: [],
			alertHistory: {},
			selectedPatientId: null,
			search: '',
			filter: 'all',
			sort: 'risk',
			page: 1,
			pageSize: 8,
			loading: true,
			realtime: true,
			kioskStatus: 'online',
			mqttStatus: 'connected',
			wifiStatus: 'stable',
			inputName: '',
			inputEmail: '',
			loginPin: '',
			loginMode: 'staff',
			historyRange: '7d',
			dateRange: '24h',
			floorFocus: 'north-wing',
			soundEnabled: true,
		};

		const patientPool = [
			{ id: 'RFID-1001', name: 'Nguyễn Thị Lan', room: 'A-203', age: 78, gender: 'Nữ' },
			{ id: 'RFID-1002', name: 'Trần Văn Minh', room: 'A-101', age: 81, gender: 'Nam' },
			{ id: 'RFID-1003', name: 'Phạm Thị Hạnh', room: 'B-205', age: 74, gender: 'Nữ' },
			{ id: 'RFID-1004', name: 'Lê Quốc Huy', room: 'B-112', age: 69, gender: 'Nam' },
			{ id: 'RFID-1005', name: 'Võ Thị Mai', room: 'C-301', age: 83, gender: 'Nữ' },
			{ id: 'RFID-1006', name: 'Đặng Văn Sơn', room: 'C-120', age: 76, gender: 'Nam' },
			{ id: 'RFID-1007', name: 'Bùi Thị Phương', room: 'D-011', age: 71, gender: 'Nữ' },
			{ id: 'RFID-1008', name: 'Hoàng Văn Phúc', room: 'D-210', age: 79, gender: 'Nam' },
			{ id: 'RFID-1009', name: 'Ngô Thị Thu', room: 'E-018', age: 67, gender: 'Nữ' },
			{ id: 'RFID-1010', name: 'Phan Văn Long', room: 'E-220', age: 85, gender: 'Nam' },
			{ id: 'RFID-1011', name: 'Dương Thị Yến', room: 'F-107', age: 73, gender: 'Nữ' },
			{ id: 'RFID-1012', name: 'Tạ Văn Khải', room: 'F-306', age: 77, gender: 'Nam' },
			{ id: 'RFID-1013', name: 'Mai Thị Ngọc', room: 'G-012', age: 68, gender: 'Nữ' },
			{ id: 'RFID-1014', name: 'Hồ Văn An', room: 'G-245', age: 82, gender: 'Nam' },
			{ id: 'RFID-1015', name: 'Lý Thị Thanh', room: 'H-055', age: 75, gender: 'Nữ' },
			{ id: 'RFID-1016', name: 'Nguyễn Văn Tâm', room: 'H-240', age: 86, gender: 'Nam' },
		];

		function rand(min, max) {
			return Math.random() * (max - min) + min;
		}

		function clamp(value, min, max) {
			return Math.max(min, Math.min(max, value));
		}

		function formatTime(date) {
			return new Intl.DateTimeFormat('vi-VN', {
				hour: '2-digit',
				minute: '2-digit',
				second: '2-digit',
			}).format(date);
		}

		function formatDateTime(date) {
			return new Intl.DateTimeFormat('vi-VN', {
				day: '2-digit',
				month: '2-digit',
				hour: '2-digit',
				minute: '2-digit',
			}).format(date);
		}

		function formatRelative(minutesAgo) {
			if (minutesAgo < 1) return 'vừa xong';
			if (minutesAgo < 60) return `${minutesAgo} phút trước`;
			const hours = Math.floor(minutesAgo / 60);
			return `${hours} giờ trước`;
		}

		function createHistorySeries(base, spread, points = 30, wiggle = 1.6) {
			const series = [];
			let value = base;
			for (let index = 0; index < points; index += 1) {
				value += rand(-wiggle, wiggle);
				series.push(Number(clamp(value + rand(-spread, spread), base - spread * 1.5, base + spread * 1.5).toFixed(1)));
			}
			return series;
		}

		function buildMockPatients() {
			const now = new Date();
			return patientPool.map((profile, index) => {
				const safe = Math.random() > 0.2;
				const heartRate = Math.round(rand(62, 96));
				const spo2 = Math.round(rand(94, 99));
				const temp = Number(rand(36.2, 37.8).toFixed(1));
				const battery = Math.round(rand(18, 100));
				const rssi = Math.round(rand(-84, -46));
				const riskScore = Math.round(rand(18, 92));
				const fall = Math.random() < 0.09;
				const signalLost = Math.random() < 0.05;
				const alert = fall || signalLost || !safe || spo2 < 94 || heartRate > 110 || heartRate < 55;
				const status = fall || signalLost ? 'danger' : safe ? 'safe' : 'warning';
				return {
					...profile,
					index,
					avatar: profile.name.split(' ').slice(-2).map((part) => part[0]).join(''),
					heartRate,
					spo2,
					temp,
					safe,
					battery,
					rssi,
					ble: signalLost ? 'Mất tín hiệu' : 'Ổn định',
					kiosk: `Kiosk ${String(1 + (index % 5)).padStart(2, '0')}`,
					zone: safe ? 'Within zone' : 'Alert zone',
					alert,
					fall,
					status,
					signalLost,
					lastUpdate: new Date(now.getTime() - Math.round(rand(0, 9)) * 60_000),
					history: {
						heartRate: createHistorySeries(heartRate, 12),
						spo2: createHistorySeries(spo2, 2.5),
						temp: createHistorySeries(temp, 0.5),
					},
					checkins: [
						{ type: 'Check-in', time: new Date(now.getTime() - rand(90, 540) * 60_000), place: profile.room },
						{ type: 'Medication', time: new Date(now.getTime() - rand(30, 240) * 60_000), place: 'Nurse station' },
						{ type: 'Check-out', time: new Date(now.getTime() - rand(10, 60) * 60_000), place: profile.room },
					],
					timeline: [
						{ label: 'Theo dõi vitals', time: new Date(now.getTime() - rand(8, 25) * 60_000), note: 'Sensor hoạt động bình thường' },
						{ label: alert ? 'Cảnh báo' : 'Đánh giá', time: new Date(now.getTime() - rand(2, 12) * 60_000), note: alert ? 'Yêu cầu y tá kiểm tra' : 'Không ghi nhận bất thường' },
						{ label: 'Cập nhật', time: new Date(now.getTime() - rand(0, 3) * 60_000), note: 'Dữ liệu đồng bộ về dashboard' },
					],
					riskScore,
				};
			});
		}

		let patients = buildMockPatients();
		state.selectedPatientId = patients[0].id;

		function updateVitals() {
			patients = patients.map((patient, index) => {
				const drift = index % 3 === 0 ? rand(-4, 5) : rand(-2.5, 2.5);
				const heartRate = Math.round(clamp(patient.heartRate + drift, 48, 146));
				const spo2 = Math.round(clamp(patient.spo2 + rand(-1, 1), 87, 100));
				const temp = Number(clamp(patient.temp + rand(-0.2, 0.2), 35.8, 38.7).toFixed(1));
				const battery = Math.round(clamp(patient.battery - rand(0, 0.8), 5, 100));
				const safe = Math.random() > 0.16;
				const signalLost = Math.random() < 0.03 ? !patient.signalLost : patient.signalLost && Math.random() < 0.6;
				const fall = Math.random() < 0.03 ? true : patient.fall && Math.random() < 0.82;
				const alert = fall || signalLost || !safe || spo2 < 94 || heartRate > 112 || heartRate < 54 || temp > 37.8;
				const status = fall || signalLost ? 'danger' : safe ? 'safe' : 'warning';
				const riskScore = clamp(Math.round((100 - spo2) * 1.2 + Math.abs(heartRate - 78) * 1.1 + Math.max(temp - 37.3, 0) * 18 + (safe ? 0 : 12) + (signalLost ? 24 : 0) + (fall ? 40 : 0)), 4, 99);
				const updatedHistory = {
					heartRate: [...patient.history.heartRate.slice(1), heartRate],
					spo2: [...patient.history.spo2.slice(1), spo2],
					temp: [...patient.history.temp.slice(1), temp],
				};
				return {
					...patient,
					heartRate,
					spo2,
					temp,
					battery,
					safe,
					signalLost,
					fall,
					alert,
					status,
					zone: safe ? 'Within zone' : 'Alert zone',
					ble: signalLost ? 'Mất tín hiệu' : battery < 20 ? 'Pin yếu' : 'Ổn định',
					rssi: Math.round(clamp(patient.rssi + rand(-2, 2), -90, -38)),
					lastUpdate: new Date(),
					history: updatedHistory,
					riskScore,
					timeline: [
						...patient.timeline.slice(0, 2),
						{ label: 'Dữ liệu đồng bộ', time: new Date(), note: 'Update realtime từ thiết bị đeo' },
					],
				};
			});

			state.mqttStatus = Math.random() > 0.06 ? 'connected' : 'degraded';
			state.wifiStatus = Math.random() > 0.04 ? 'stable' : 'unstable';
			state.kioskStatus = Math.random() > 0.05 ? 'online' : 'warning';

			const criticalPatients = patients.filter((patient) => patient.fall || patient.signalLost || patient.spo2 < 92 || patient.heartRate > 125);
			if (criticalPatients.length && state.soundEnabled) {
				enqueueAlert(criticalPatients[0], 'critical', { showModal: false, cooldownMs: 45000 });
			}
			render();
		}

		function enqueueAlert(patient, type, options = {}) {
			const { showModal = true, cooldownMs = 0 } = options;
			const now = Date.now();
			const lastAlertAt = state.alertHistory[patient.id] || 0;
			if (cooldownMs && now - lastAlertAt < cooldownMs) {
				return;
			}
			state.alertHistory = {
				...state.alertHistory,
				[patient.id]: now,
			};
			const alert = {
				id: `${now}-${Math.random().toString(16).slice(2)}`,
				type,
				patient,
				time: new Date(),
				kiosk: patient.kiosk,
			};
			if (showModal && (!state.alertModal || state.alertModal.patient.id !== patient.id)) {
				state.alertModal = alert;
			}
			state.toastQueue.unshift({
				id: alert.id,
				title: type === 'critical' ? 'Cảnh báo khẩn cấp' : 'Cập nhật trạng thái',
				message: `${patient.name} tại ${patient.kiosk}`,
				tone: type === 'critical' ? 'danger' : 'info',
			});
			state.toastQueue = state.toastQueue.slice(0, 3);
			playAlarmTone();
			render();
			setTimeout(() => {
				if (state.alertModal && state.alertModal.id === alert.id) state.alertModal = null;
				render();
			}, 5200);
		}

		function playAlarmTone() {
			if (!state.soundEnabled) return;
			try {
				const AudioContextClass = window.AudioContext || window.webkitAudioContext;
				if (!AudioContextClass) return;
				const context = new AudioContextClass();
				const oscillator = context.createOscillator();
				const gain = context.createGain();
				oscillator.type = 'sine';
				oscillator.frequency.setValueAtTime(880, context.currentTime);
				oscillator.frequency.exponentialRampToValueAtTime(520, context.currentTime + 0.18);
				gain.gain.setValueAtTime(0.0001, context.currentTime);
				gain.gain.exponentialRampToValueAtTime(0.08, context.currentTime + 0.05);
				gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + 0.5);
				oscillator.connect(gain);
				gain.connect(context.destination);
				oscillator.start();
				oscillator.stop(context.currentTime + 0.52);
			} catch (error) {
			}
		}

		function getVisiblePatients() {
			let items = [...patients];
			if (state.search.trim()) {
				const keyword = state.search.trim().toLowerCase();
				items = items.filter((patient) =>
					[patient.name, patient.id, patient.room, patient.kiosk].join(' ').toLowerCase().includes(keyword)
				);
			}
			if (state.filter !== 'all') {
				items = items.filter((patient) => patient.status === state.filter);
			}
			if (state.sort === 'name') {
				items.sort((left, right) => left.name.localeCompare(right.name, 'vi'));
			} else if (state.sort === 'heartRate') {
				items.sort((left, right) => right.heartRate - left.heartRate);
			} else if (state.sort === 'risk') {
				items.sort((left, right) => right.riskScore - left.riskScore);
			} else if (state.sort === 'updated') {
				items.sort((left, right) => right.lastUpdate - left.lastUpdate);
			}
			return items;
		}

		function currentPatient() {
			return patients.find((patient) => patient.id === state.selectedPatientId) || patients[0];
		}

		function linePath(series, width, height, padding = 16) {
			const min = Math.min(...series);
			const max = Math.max(...series);
			const span = max - min || 1;
			const innerWidth = width - padding * 2;
			const innerHeight = height - padding * 2;
			return series.map((value, index) => {
				const x = padding + (index / (series.length - 1)) * innerWidth;
				const y = padding + (1 - (value - min) / span) * innerHeight;
				return [Number(x.toFixed(1)), Number(y.toFixed(1))];
			});
		}

		function chartCard(title, series, unit, accent, extra = '') {
			const width = 760;
			const height = 240;
			const points = linePath(series, width, height, 24);
			const path = points.map((point, index) => `${index === 0 ? 'M' : 'L'} ${point[0]} ${point[1]}`).join(' ');
			const fill = `${path} L ${width - 24} ${height - 24} L 24 ${height - 24} Z`;
			const min = Math.min(...series);
			const max = Math.max(...series);
			return `
				<div class="card rounded-[28px] p-5 md:p-6 shadow-soft animate-slideIn">
					<div class="flex items-start justify-between gap-4 mb-4">
						<div>
							<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">${title}</div>
							<div class="mt-1 text-2xl font-extrabold tracking-tight">${series[series.length - 1]}<span class="ml-1 text-sm font-semibold text-slate-500">${unit}</span></div>
						</div>
						<div class="text-right">
							<div class="text-xs uppercase tracking-[0.24em] text-slate-400">Độ biến thiên</div>
							<div class="mt-1 text-sm font-semibold ${accent}">${extra || `${min} - ${max} ${unit}`}</div>
						</div>
					</div>
					<svg viewBox="0 0 ${width} ${height}" class="w-full h-56 rounded-[24px] bg-gradient-to-b from-slate-50/80 to-white dark:from-slate-900/70 dark:to-slate-950 overflow-hidden">
						<defs>
							<linearGradient id="${title.replace(/\s+/g, '-')}-line" x1="0" x2="1" y1="0" y2="0">
								<stop offset="0%" stop-color="${accent.includes('emerald') ? '#20b46d' : accent.includes('red') ? '#ef4444' : '#2196ff'}" />
								<stop offset="100%" stop-color="${accent.includes('emerald') ? '#86efac' : accent.includes('red') ? '#f97316' : '#67e8f9'}" />
							</linearGradient>
							<linearGradient id="${title.replace(/\s+/g, '-')}-fill" x1="0" x2="0" y1="0" y2="1">
								<stop offset="0%" stop-color="${accent.includes('emerald') ? 'rgba(32,180,109,0.26)' : accent.includes('red') ? 'rgba(239,68,68,0.24)' : 'rgba(33,150,255,0.22)'}" />
								<stop offset="100%" stop-color="rgba(33,150,255,0.02)" />
							</linearGradient>
						</defs>
						<g opacity="0.52">
							${Array.from({ length: 5 }).map((_, index) => `<line x1="24" y1="${24 + index * 42}" x2="736" y2="${24 + index * 42}" stroke="rgba(148,163,184,0.12)" />`).join('')}
						</g>
						<path d="${fill}" fill="url(#${title.replace(/\s+/g, '-')}-fill)" />
						<path d="${path}" fill="none" stroke="url(#${title.replace(/\s+/g, '-')}-line)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
						${points.map((point) => `<circle cx="${point[0]}" cy="${point[1]}" r="4.5" fill="#fff" stroke="url(#${title.replace(/\s+/g, '-')}-line)" stroke-width="3" />`).join('')}
					</svg>
				</div>
			`;
		}

		function progressBar(value, max, tone = 'brand') {
			const pct = Math.round((value / max) * 100);
			const toneClass = tone === 'danger'
				? 'from-red-500 to-orange-500'
				: tone === 'warning'
					? 'from-amber-400 to-yellow-400'
					: tone === 'mint'
						? 'from-emerald-400 to-green-500'
						: 'from-brand-400 to-cyan-400';
			return `

		function metricCard(title, value, delta, icon, tone, note) {
			const toneClass = {
				brand: 'from-brand-500 to-cyan-400',
				mint: 'from-emerald-400 to-green-500',
				amber: 'from-amber-400 to-orange-400',
				red: 'from-red-500 to-rose-500',
			}[tone] || 'from-brand-500 to-cyan-400';
			return `
				<div class="card rounded-[28px] p-5 shadow-soft transition duration-300 hover:-translate-y-1">
					<div class="flex items-start justify-between gap-4">
						<div>
							<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">${title}</div>
							<div class="mt-2 text-3xl font-black tracking-tight">${value}</div>
							<div class="mt-2 text-sm font-semibold ${delta.startsWith('+') ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-500 dark:text-slate-400'}">${delta}</div>
							<div class="mt-2 text-xs text-slate-400 dark:text-slate-500">${note}</div>
						</div>
						<div class="rounded-[22px] bg-gradient-to-br ${toneClass} p-3 text-white shadow-soft">
							<i data-lucide="${icon}" class="h-6 w-6"></i>
						</div>
					</div>
				</div>
			`;
		}

		function statChip(label, value, tone) {
			const tones = {
				green: 'bg-emerald-50 text-emerald-700 ring-1 ring-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-300 dark:ring-emerald-500/20',
				amber: 'bg-amber-50 text-amber-700 ring-1 ring-amber-200 dark:bg-amber-500/10 dark:text-amber-300 dark:ring-amber-500/20',
				red: 'bg-red-50 text-red-700 ring-1 ring-red-200 dark:bg-red-500/10 dark:text-red-300 dark:ring-red-500/20',
				blue: 'bg-brand-50 text-brand-700 ring-1 ring-brand-200 dark:bg-brand-500/10 dark:text-brand-300 dark:ring-brand-500/20',
			};
			return `<div class="rounded-2xl px-3 py-2 text-sm font-semibold ${tones[tone] || tones.blue}"><span class="text-xs uppercase tracking-[0.16em] opacity-70">${label}</span><div class="mt-1 text-base font-black">${value}</div></div>`;
		}

		function renderOverview() {
			const safeCount = patients.filter((patient) => patient.status === 'safe').length;
			const warningCount = patients.filter((patient) => patient.status === 'warning').length;
			const dangerCount = patients.filter((patient) => patient.status === 'danger').length;
			const fallCount = patients.filter((patient) => patient.fall).length;
			const avgHeart = Math.round(patients.reduce((sum, patient) => sum + patient.heartRate, 0) / patients.length);
			const avgTemp = (patients.reduce((sum, patient) => sum + patient.temp, 0) / patients.length).toFixed(1);
			const avgSpO2 = Math.round(patients.reduce((sum, patient) => sum + patient.spo2, 0) / patients.length);
			const heartSeries = Array.from({ length: 18 }, (_, index) => Math.round(avgHeart + Math.sin((index / 17) * Math.PI * 2) * 7 + rand(-3, 3)));
			const tempSeries = Array.from({ length: 18 }, (_, index) => Number((Number(avgTemp) + Math.sin((index / 17) * Math.PI * 2) * 0.18 + rand(-0.08, 0.08)).toFixed(1)));
			const alertPatients = patients.filter((patient) => patient.status !== 'safe').slice(0, 4);
			const criticalItems = [
				{ label: 'MQTT', value: state.mqttStatus === 'connected' ? 'Connected' : 'Degraded', tone: state.mqttStatus === 'connected' ? 'green' : 'amber' },
				{ label: 'Wi-Fi', value: state.wifiStatus === 'stable' ? 'Stable' : 'Unstable', tone: state.wifiStatus === 'stable' ? 'green' : 'amber' },
				{ label: 'Kiosk', value: state.kioskStatus === 'online' ? 'Online' : 'Warning', tone: state.kioskStatus === 'online' ? 'green' : 'amber' },
				{ label: 'BLE', value: `${patients.filter((patient) => patient.signalLost).length} issue(s)`, tone: patients.some((patient) => patient.signalLost) ? 'red' : 'blue' },
			];

			return `
				<div class="space-y-6 animate-slideIn">
					<section class="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
						${metricCard('Tổng bệnh nhân', patients.length, '+ realtime', 'users-round', 'brand', 'Đang theo dõi trực tiếp')}
						${metricCard('Bệnh nhân an toàn', safeCount, `${safeCount >= 12 ? '+' : ''}${safeCount - 12}`, 'shield-check', 'mint', 'Vùng an toàn / vitals ổn')}
						${metricCard('Cảnh báo đang hoạt động', warningCount + dangerCount, dangerCount ? `${dangerCount} nguy hiểm` : 'Giám sát', 'triangle-alert', dangerCount ? 'red' : 'amber', 'Té ngã, SpO₂ thấp, mất tín hiệu')}
						${metricCard('Té ngã hôm nay', fallCount, `${fallCount > 0 ? '+' : ''}${fallCount}`, 'person-standing', fallCount > 0 ? 'red' : 'amber', 'Phát hiện từ wearable/kiosk')}
					</section>

					<section class="grid gap-6 xl:grid-cols-[1.45fr_0.95fr]">
						<div class="space-y-6">
							<div class="grid gap-4 lg:grid-cols-2">
								${chartCard('Nhịp tim trung bình', heartSeries, 'bpm', 'text-brand-600 dark:text-brand-300', `AVG ${avgHeart} bpm`)}
								${chartCard('Nhiệt độ cơ thể', tempSeries, '°C', 'text-emerald-600 dark:text-emerald-300', `AVG ${avgTemp} °C`)}
							</div>
							<div class="card rounded-[30px] p-5 shadow-soft">
								<div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
									<div>
										<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">Overview snapshots</div>
										<div class="mt-1 text-2xl font-black tracking-tight">Realtime health status</div>
									</div>
									<div class="flex flex-wrap gap-2">
										${statChip('SpO₂ average', `${avgSpO2}%`, avgSpO2 < 94 ? 'red' : 'green')}
										${statChip('MQTT', state.mqttStatus, state.mqttStatus === 'connected' ? 'green' : 'amber')}
										${statChip('Wi-Fi', state.wifiStatus, state.wifiStatus === 'stable' ? 'green' : 'amber')}
									</div>
								</div>
								<div class="mt-5 grid gap-4 md:grid-cols-2 xl:grid-cols-4">
									${criticalItems.map((item) => `
										<div class="rounded-[24px] bg-slate-50 p-4 dark:bg-slate-950/50">
											<div class="text-xs font-bold uppercase tracking-[0.2em] text-slate-400">${item.label}</div>
											<div class="mt-2 text-lg font-black ${item.tone === 'green' ? 'text-emerald-600 dark:text-emerald-300' : item.tone === 'red' ? 'text-red-600 dark:text-red-300' : 'text-slate-800 dark:text-slate-100'}">${item.value}</div>
											<div class="mt-3">${progressBar(item.label === 'BLE' ? patients.filter((patient) => !patient.signalLost).length : item.tone === 'green' ? 92 : 58, 100, item.tone === 'green' ? 'mint' : item.tone === 'red' ? 'danger' : 'warning')}</div>
										</div>
									`).join('')}
								</div>
							</div>
						</div>

						<div class="space-y-6">
							<div class="card rounded-[30px] p-5 shadow-soft">
								<div class="flex items-center justify-between">
									<div>
										<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">System status</div>
										<div class="mt-1 text-xl font-black">MQTT / Wi-Fi / Kiosk</div>
									</div>
									<span class="inline-flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-1.5 text-xs font-bold text-emerald-700 dark:bg-emerald-500/10 dark:text-emerald-300"><span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>Realtime</span>
								</div>
								<div class="mt-5 space-y-3">
									${[
										['MQTT Broker', state.mqttStatus, state.mqttStatus === 'connected' ? 96 : 61, state.mqttStatus === 'connected' ? 'mint' : 'amber'],
										['Wi-Fi Core', state.wifiStatus, state.wifiStatus === 'stable' ? 94 : 58, state.wifiStatus === 'stable' ? 'mint' : 'amber'],
										['Kiosk Fleet', state.kioskStatus, state.kioskStatus === 'online' ? 91 : 54, state.kioskStatus === 'online' ? 'mint' : 'amber'],
									].map(([label, value, pct, tone]) => `
										<div class="space-y-2 rounded-[20px] bg-slate-50 p-4 dark:bg-slate-950/50">
											<div class="flex items-center justify-between text-sm font-semibold"><span>${label}</span><span class="capitalize ${tone === 'mint' ? 'text-emerald-600 dark:text-emerald-300' : 'text-amber-600 dark:text-amber-300'}">${value}</span></div>
											${progressBar(Number(pct), 100, tone)}
										</div>
									`).join('')}
								</div>
							</div>

							<div class="card rounded-[30px] p-5 shadow-soft">
								<div class="flex items-center justify-between">
									<div>
										<div class="text-sm font-semibold text-slate-500 dark:text-slate-400">Danger pulse</div>
										<div class="mt-1 text-xl font-black">Cảnh báo nổi bật</div>
									</div>
									<div class="rounded-full bg-red-50 px-3 py-1.5 text-xs font-bold text-red-700 dark:bg-red-500/10 dark:text-red-300">${alertPatients.length} active</div>
								</div>
								<div class="mt-4 space-y-3">
									${alertPatients.length ? alertPatients.map((patient) => `
										<button data-action="open-patient" data-id="${patient.id}" class="w-full rounded-[24px] border border-red-200 bg-red-50/80 p-4 text-left transition hover:-translate-y-0.5 hover:shadow-soft dark:border-red-500/20 dark:bg-red-500/10">
											<div class="flex items-center justify-between gap-3">
												<div class="flex items-center gap-3">
													<div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-white text-slate-900 shadow-sm dark:bg-slate-950 dark:text-white">${patient.avatar}</div>
													<div>
														<div class="font-bold">${patient.name}</div>
														<div class="text-sm text-slate-500 dark:text-slate-300">${patient.kiosk} · ${patient.room}</div>
													</div>
												</div>
												<span class="rounded-full bg-red-600 px-3 py-1 text-xs font-bold text-white ${patient.fall || patient.signalLost ? 'pulse-critical' : ''}">${patient.fall ? 'FALL' : patient.signalLost ? 'LOST SIGNAL' : 'ALERT'}</span>
											</div>
											<div class="mt-4 grid grid-cols-3 gap-2 text-sm">
												<div class="rounded-2xl bg-white/80 p-2 text-center dark:bg-slate-950/60"><div class="text-[11px] text-slate-400">HR</div><div class="font-black text-slate-900 dark:text-white">${patient.heartRate}</div></div>
												<div class="rounded-2xl bg-white/80 p-2 text-center dark:bg-slate-950/60"><div class="text-[11px] text-slate-400">SpO₂</div><div class="font-black text-slate-900 dark:text-white">${patient.spo2}%</div></div>
												<div class="rounded-2xl bg-white/80 p-2 text-center dark:bg-slate-950/60"><div class="text-[11px] text-slate-400">Temp</div><div class="font-black text-slate-900 dark:text-white">${patient.temp}°</div></div>
											</div>
										</button>
									`).join('') : '<div class="rounded-[24px] bg-slate-50 p-4 text-sm text-slate-500 dark:bg-slate-950/60 dark:text-slate-400">Không có cảnh báo nguy hiểm hiện tại</div>'}
								</div>
							</div>
						</div>
					</section>
				</div>
			`;
		}

		function renderPatients() {

						<div class="mt-5 grid gap-3 sm:grid-cols-2 xl:grid-cols-4">

					<div class="card rounded-[30px] p-4 shadow-soft">

									<option value="all" ${state.filter === 'all' ? 'selected' : ''}>Tất cả</option>
									<option value="safe" ${state.filter === 'safe' ? 'selected' : ''}>An toàn</option>

		function applyTheme() {
			document.documentElement.classList.toggle('dark', state.darkMode);
			localStorage.setItem(THEME_KEY, state.darkMode ? 'dark' : 'light');
		}

		function showToast(title, message, tone = 'info') {
			const toast = { id: `${Date.now()}-${Math.random().toString(16).slice(2)}`, title, message, tone, time: new Date() };
			state.toastQueue.unshift(toast);
			state.toastQueue = state.toastQueue.slice(0, 5);
			render();
			setTimeout(() => {
				state.toastQueue = state.toastQueue.filter((item) => item.id !== toast.id);
				render();
			}, 4200);
		}

		function bindEvents() {
			const app = document.getElementById('app');
			app.querySelectorAll('[data-bind]').forEach((element) => {
				element.addEventListener('input', (event) => {
					state[element.dataset.bind] = event.target.value;
					if (element.dataset.bind === 'pageSize') state.page = 1;
					render();
				});
			});
			app.querySelectorAll('select[data-bind]').forEach((element) => {
				element.addEventListener('change', (event) => {
					state[element.dataset.bind] = event.target.value;
					if (element.dataset.bind === 'pageSize') state.page = 1;
					render();
				});
			});
			app.querySelectorAll('[data-action]').forEach((element) => {
				element.addEventListener('click', (event) => {
					const action = element.dataset.action;
					const view = element.dataset.view;
					const id = element.dataset.id;
					const range = element.dataset.range;
					const page = element.dataset.page;
					if (action === 'toggle-theme') {
						state.darkMode = !state.darkMode;
						applyTheme();
						render();
					}
					if (action === 'show-login') {
						state.screen = 'login';
						render();
					}
					if (action === 'show-landing') {
						state.screen = 'landing';
						state.authed = false;
						render();
					}
					if (action === 'demo-login') {
						state.authed = true;
						state.screen = 'app';
						state.loading = false;
						state.profileOpen = false;
						state.notificationsOpen = false;
						showToast('Chào mừng', 'Đăng nhập thành công vào MedPulse.', 'info');
						render();
					}
					if (action === 'fill-demo') {
						state.inputName = 'nurse.le';
						state.loginPin = DEMO_PASSWORD;
						render();
					}
					if (action === 'toggle-sidebar') {
						state.sidebarOpen = !state.sidebarOpen;
						render();
					}
					if (action === 'toggle-profile') {
						state.profileOpen = !state.profileOpen;
						state.notificationsOpen = false;
						render();
					}
					if (action === 'toggle-notifications') {
						state.notificationsOpen = !state.notificationsOpen;
						state.profileOpen = false;
						render();
					}
					if (action === 'switch-view' && view) {
						state.view = view;
						state.profileOpen = false;
						state.notificationsOpen = false;
						state.sidebarOpen = window.innerWidth >= 1024;
						if (view === 'detail' && !state.selectedPatientId) state.selectedPatientId = patients[0].id;
						render();
					}
					if (action === 'open-patient' && id) {
						state.selectedPatientId = id;
						state.view = 'detail';
						state.profileOpen = false;
						state.notificationsOpen = false;
						render();
					}
					if (action === 'paginate' && page) {
						state.page = Number(page);
						render();
					}
					if (action === 'export-pdf') {
						window.print();
					}
					if (action === 'simulate-alert') {
						enqueueAlert(currentPatient(), 'critical', { showModal: true });
					}
					if (action === 'open-toast') {
						showToast('Synced', 'Dữ liệu realtime vừa được cập nhật từ MQTT.', 'info');
					}
					if (action === 'dismiss-alert') {
						state.alertModal = null;
						render();
					}
					if (action === 'dismiss-toast' && id) {
						state.toastQueue = state.toastQueue.filter((toast) => toast.id !== id);
						render();
					}
					if (action === 'toggle-sound') {
						state.soundEnabled = !state.soundEnabled;
						render();
					}
					if (action === 'set-range' && range) {
						state.historyRange = range;
						render();
					}
					if (action === 'logout') {
						state.authed = false;
						state.screen = 'landing';
						state.profileOpen = false;
						state.notificationsOpen = false;
						render();
					}
					event.preventDefault();
				});
			});
		}

		function bootstrap() {
			const savedTheme = localStorage.getItem(THEME_KEY);
			if (savedTheme) state.darkMode = savedTheme === 'dark';
			const saved = localStorage.getItem(STORAGE_KEY);
			if (saved) {
				try {
					const parsed = JSON.parse(saved);
					Object.assign(state, parsed);
					state.loading = true;
				} catch (error) {
				}
			}
			applyTheme();
			render();
			setTimeout(() => {
				state.loading = false;
				if (!state.authed) {
					state.screen = 'landing';
				}
				render();
			}, 900);
			setInterval(() => {
				if (state.authed) {
					updateVitals();
					localStorage.setItem(STORAGE_KEY, JSON.stringify({
						authed: state.authed,
						screen: state.screen,
						view: state.view,
						selectedPatientId: state.selectedPatientId,
						darkMode: state.darkMode,
						soundEnabled: state.soundEnabled,
						historyRange: state.historyRange,
					}));
				}
			}, 2600);
			document.addEventListener('click', (event) => {
				if (!event.target.closest('[data-action="toggle-profile"]')) {
					state.profileOpen = false;
				}
				if (!event.target.closest('[data-action="toggle-notifications"]')) {
					if (!event.target.closest('.fixed.right-4.top-20') && !event.target.closest('.fixed.right-6.top-20') && !event.target.closest('.fixed.right-8.top-20')) {
						state.notificationsOpen = false;
					}
				}
			});
			window.addEventListener('keydown', (event) => {
				if (event.key === 'Escape') {
					state.profileOpen = false;
					state.notificationsOpen = false;
					state.alertModal = null;
					render();
				}
			});
		}

		bootstrap();
	</script>
</body>
</html>
